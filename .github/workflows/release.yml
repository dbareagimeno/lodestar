name: Release

# Publica los artefactos (CLI + MCP) cuando se empuja un tag `vX.Y.Z`.
# - Job `create-release`: crea el release en borrador una sola vez.
# - Job `binaries`: compila la CLI y el MCP por plataforma y sube los tarballs/zip
#   a ese release.
# La UI de escritorio (Tauri) se movió a la rama `experimental/ui-desktop`; este
# pipeline ya no construye ni publica el bundle de escritorio.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# El release necesita escribir (crear el release y subir artefactos).
permissions:
  contents: write

# Un solo release en vuelo por ref; no cancelamos uno a medias.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Crea el release en borrador una sola vez (antes lo creaba el job `app` de
  # Tauri). Idempotente: si ya existe para este tag, no falla.
  # ---------------------------------------------------------------------------
  create-release:
    name: Crea el release en borrador
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crea (o reutiliza) el release en borrador
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release view ${{ github.ref_name }} >/dev/null 2>&1 ||
          gh release create ${{ github.ref_name }}
          --draft
          --title "lodestar ${{ github.ref_name }}"
          --notes "Ver CHANGELOG.md."

  # ---------------------------------------------------------------------------
  # Binarios de línea de comandos: lodestar (CLI) y lodestar-mcp (MCP).
  # No arrastran Tauri ni webkit, así que no hacen falta apt ni node.
  # Se suben al release que creó `create-release`.
  # ---------------------------------------------------------------------------
  binaries:
    name: Binarios CLI/MCP (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instala toolchain (stable + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2

      - name: Compila CLI y MCP (release)
        run: cargo build --release --locked -p lodestar-cli -p lodestar-mcp

      - name: Empaqueta binarios (unix)
        if: runner.os != 'Windows'
        run: >-
          tar czf lodestar-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          -C target/release lodestar lodestar-mcp

      - name: Empaqueta binarios (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          Compress-Archive
          -Path target/release/lodestar.exe, target/release/lodestar-mcp.exe
          -DestinationPath lodestar-cli-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Sube al release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload ${{ github.ref_name }}
          lodestar-cli-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          --clobber
