name: CI

# Gate de calidad: ninguna rama puede mergearse a `main` sin pasar TODOS estos jobs.
# (Para bloquear el merge de verdad, activa "Require status checks to pass" en la
#  protección de rama de `main` y marca como obligatorios: rust, core-purity.)

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs antiguos de la misma rama/PR para no malgastar minutos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust: formato + lint estricto + compila TODO + tests. Si algo no compila, falla.
  #
  # Corre en las TRES plataformas objetivo del producto (macOS Apple Silicon,
  # Windows y Linux). Esto ~triplica los minutos de CI del job de Rust, pero
  # lodestar es un motor headless multiplataforma: el watcher `notify` y el I/O
  # de ficheros tienen rutas de código dependientes del SO, así que hay que
  # compilarlos y testearlos en cada una. `fail-fast: false` para ver TODAS las
  # plataformas que fallan, no solo la primera.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust · fmt · clippy · build · test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instala toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2

      # E15-H04: el CI ya NO instala node. El arnés diferencial JS-vs-Rust se retiró con el
      # prototipo como spec de comportamiento (la spec es ahora `docs/REFACTOR_PHASE_2.md` +
      # `ARCHITECTURE.md §20`); `prototype/` se conserva como referencia histórica de v0.2.x,
      # sin ejecutarse.

      - name: Formato (falla si no está formateado)
        run: cargo fmt --all --check

      - name: Clippy (warnings = error, todos los targets y features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      # `--all-targets` compila también tests, benches y ejemplos: garantiza que NADA que
      # no compile entre en la rama, no solo el código de producción.
      - name: Build (todo el workspace, todos los targets)
        run: cargo build --workspace --all-targets --locked

      - name: Tests
        run: cargo test --workspace --locked

      - name: Doc (los doc-comments deben compilar; intra-doc links rotos = error)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ---------------------------------------------------------------------------
  # Invariante #2 (ARCHITECTURE.md §2.2, §10 fila 2, E8-H11): el core es PURO.
  # Falla si lodestar-core adquiere una dependencia de I/O/DB/git/runtime/GUI.
  # ---------------------------------------------------------------------------
  core-purity:
    name: Core puro (sin tokio/rusqlite/git2/notify/tauri/zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verifica el árbol de dependencias de lodestar-core
        run: |
          set -euo pipefail
          tree="$(cargo tree -p lodestar-core --edges normal --prefix none --locked)"
          echo "$tree"
          forbidden='^(tokio|rusqlite|libsqlite3-sys|git2|libgit2-sys|notify|notify-debouncer-full|tauri|tauri-build|zip) '
          if echo "$tree" | grep -Eq "$forbidden"; then
            echo "::error::lodestar-core arrastra una dependencia prohibida (debe permanecer puro)."
            echo "$tree" | grep -E "$forbidden" || true
            exit 1
          fi
          echo "OK: lodestar-core es puro."

      # E15-H01/H03: git y el formato zip salieron del REPO, no solo de la superficie.
      # Criterio de aceptación de E15-H01: `cargo tree --workspace` no muestra `git2` ni
      # `lodestar-vcs`; el de E15-H03: no muestra `zip`.
      - name: Verifica que git y zip no están en el workspace
        run: |
          set -euo pipefail
          tree="$(cargo tree --workspace --edges normal --prefix none --locked)"
          forbidden='^(git2|libgit2-sys|lodestar-vcs|zip) '
          if echo "$tree" | grep -Eq "$forbidden"; then
            echo "::error::el workspace arrastra git2/lodestar-vcs/zip, retirados en E15-H01/H03."
            echo "$tree" | grep -E "$forbidden" || true
            exit 1
          fi
          echo "OK: sin git2/lodestar-vcs/zip en el workspace."
