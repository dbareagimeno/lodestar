# Contrato IPC front↔back (Tauri) — spec de SUPERFICIE Y SEMÁNTICA.
#
# Se verifica contra el código real con `/contrato --check` (agente `guardian-contrato`).
# Refleja `src-tauri/src/main.rs`: `#[tauri::command]` + `generate_handler!` + `app.emit`.
#
# REGLAS (ver contracts/README.md):
#   - Los TIPOS NO se definen aquí: se REFERENCIAN por nombre de `lodestar_core::types`
#     (o de `lodestar_workspace` para composites de fachada como `BundleSnapshot`). Si un
#     campo aparece expandido es solo para objetos json ad-hoc que la fachada arma a mano
#     (no tipos del core). En discrepancia de tipos gana `core::types`.
#   - Nombres de comando/evento CONGELADOS (ARCHITECTURE.md §7.1, §10 fila 7): una
#     discrepancia de nombre nunca se «arregla» renombrando el código.
#   - `fuente:` señala fichero:línea aproximada para poder auditar cada entrada.
#
# INVARIANTES transversales de escritura (aplican a write_concept/create_concept/
# update_frontmatter/commit): escriben el `.md` atómico (temp+rename) por el ÚNICO escritor
# de la workspace; NUNCA tocan la cache `.lodestar/index.db` (el watcher reconcilia, gate
# hash blake3). `path: String` se valida a `RelPath` en la fachada (rechaza absolutas/`..`).

meta:
  fachada: lodestar-tauri (binario lodestar-desktop)
  fuente: src-tauri/src/main.rs
  handler: "tauri::generate_handler![…]  (src-tauri/src/main.rs:349)"
  estado_global: "AppState { ws: Mutex<Option<Workspace>> } — un bundle por proceso (§12 lockfile)"
  error_wire: "CmdResult<T> = Result<T, String>; todo error viaja como string legible"
  error_comun: "«no hay ningún bundle abierto» si no hay Workspace instalado (with_ws, main.rs:38)"

comandos:
  - nombre: open_bundle
    fuente: src-tauri/src/main.rs:93
    params:
      - { nombre: path, tipo: String, semantica: "ruta absoluta del directorio del bundle" }
    retorno: BundleSnapshot
    errores:
      - "«{path} no existe o no es un directorio»"
      - "«{path} no es un workspace lodestar (falta index.md o .lodestar/)»"
      - "WorkspaceError (open_live) como string"
    semantica: >-
      Abre el bundle en vivo (Workspace::open_live), arranca el forwarder del bus IndexEvent
      → `bundle:changed`, y lo instala como bundle del proceso. Exige index.md o .lodestar/
      para no crear cache ni indexar un directorio arbitrario (anti-traversal).

  - nombre: pick_folder
    fuente: src-tauri/src/main.rs:114
    params: []
    retorno: "Option<String>  # ruta elegida, o null si se cancela"
    errores: []
    semantica: "Diálogo nativo de carpeta (plugin dialog). Comando async: el picker bloqueante corre fuera del hilo principal."

  - nombre: create_bundle
    fuente: src-tauri/src/main.rs:126
    params:
      - { nombre: path, tipo: String, semantica: "directorio destino del bundle nuevo" }
    retorno: BundleSnapshot
    errores:
      - "WorkspaceError (init_bundle / open_live) como string"
    semantica: >-
      Scaffold de workspace (Workspace::init_bundle: index raíz + git init + commit inicial;
      idempotente sobre un bundle existente) y lo abre en vivo con forwarder.

  - nombre: get_snapshot
    fuente: src-tauri/src/main.rs:137
    params: []
    retorno: BundleSnapshot
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Snapshot actual (files + Analysis + GraphModel) del bundle abierto."

  - nombre: list_concepts
    fuente: src-tauri/src/main.rs:142
    params: []
    retorno: "Vec<ConceptSummary>"
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Árbol de concepts (title ya resuelto, orphan/invalid derivados del Analysis del core)."

  - nombre: read_concept
    fuente: src-tauri/src/main.rs:150
    params:
      - { nombre: path, tipo: "RelPath (via String)", semantica: "concept a leer" }
    retorno: "String  # markdown crudo tal cual en disco"
    errores: ["InvalidRelPath", "WorkspaceError (no encontrado / IO) como string"]
    semantica: "Lee el `.md` crudo. Solo lectura; los `.md` en disco son la única fuente de verdad."

  - nombre: write_concept
    fuente: src-tauri/src/main.rs:157
    params:
      - { nombre: path, tipo: "RelPath (via String)" }
      - { nombre: content, tipo: String, semantica: "contenido `.md` completo" }
      - { nombre: allow_nonconformant, tipo: "Option<bool>", default: false }
    retorno: "WriteOutcome (json: path, written, rejected, checks, bundleHardFail)"
    errores: ["InvalidRelPath", "WorkspaceError como string"]
    semantica: >-
      Escribe el `.md` atómico vía el único escritor; nunca la cache. Rechaza no conforme
      (written:false + rejected) salvo allow_nonconformant. `raw`/`hash` de WriteOutcome NO
      cruzan la frontera (la fachada solo serializa los 5 campos listados).

  - nombre: create_concept
    fuente: src-tauri/src/main.rs:172
    params:
      - { nombre: path, tipo: "RelPath (via String)" }
      - { nombre: type, tipo: String, semantica: "campo `type` del frontmatter (r#type en Rust)" }
      - { nombre: title, tipo: "Option<String>" }
      - { nombre: body, tipo: "Option<String>", default: "\"\"  # cuerpo Markdown" }
      - { nombre: allow_nonconformant, tipo: "Option<bool>", default: false }
    retorno: "WriteOutcome (json: path, written, rejected, checks, bundleHardFail)"
    errores: ["InvalidRelPath", "WorkspaceError como string"]
    semantica: "Crea un concept validado (rechaza no conforme salvo allow). Escritura atómica por el único escritor."

  - nombre: update_frontmatter
    fuente: src-tauri/src/main.rs:195
    params:
      - { nombre: path, tipo: "RelPath (via String)" }
      - { nombre: patch, tipo: "FrontmatterPatch (via Value)", semantica: "merge-patch RFC 7386: valor escribe/reemplaza, null BORRA, clave ausente no toca" }
    retorno: "WriteOutcome (json: path, written, rejected, checks, bundleHardFail)"
    errores: ["«patch debe ser un objeto»", "InvalidRelPath", "WorkspaceError como string"]
    semantica: "Aplica el patch al frontmatter y reescribe el `.md` atómico si es conforme. Único escritor; nunca la cache."

  - nombre: conformance
    fuente: src-tauri/src/main.rs:210
    params: []
    retorno: Analysis
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Gate OKF del bundle: el `Analysis` completo computado por el core (una sola verdad)."

  - nombre: query
    fuente: src-tauri/src/main.rs:218
    params:
      - { nombre: dsl, tipo: String, semantica: "DSL del prototipo: «type:X tag:y is:orphan texto…» (body/texto = subcadena, no FTS)" }
    retorno: "Vec<RelPath>"
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Query estructurada; misma lógica del core que CLI/MCP."

  - nombre: backlinks
    fuente: src-tauri/src/main.rs:226
    params:
      - { nombre: path, tipo: "RelPath (via String)" }
    retorno: Backlinks
    errores: ["InvalidRelPath", "WorkspaceError como string"]
    semantica: "Vecindad de enlaces del concept: inbound (con href), indexRefs, out, dangling."

  - nombre: graph_model
    fuente: src-tauri/src/main.rs:234
    params: []
    retorno: GraphModel
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Grafo completo del bundle (nodes + edges), fuente de la isla imperativa del grafo."

  - nombre: neighborhood
    fuente: src-tauri/src/main.rs:242
    params:
      - { nombre: path, tipo: "RelPath (via String)", semantica: "concept centro" }
      - { nombre: depth, tipo: "Option<u32>", default: 1 }
      - { nombre: direction, tipo: "Option<String> (Direction)", valores: ["out", "in", "both"], default: "out  # cualquier otro valor → Out" }
    retorno: Neighborhood
    errores: ["InvalidRelPath", "WorkspaceError como string"]
    semantica: "Subgrafo dirigido alrededor del concept (out=dependencias, in=blast-radius, both=mapa local)."

  - nombre: history
    fuente: src-tauri/src/main.rs:262
    params:
      - { nombre: limit, tipo: "Option<usize>", default: 20 }
    retorno: "Vec<CommitRow>"
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Historial de commits (libgit2 local, sin red; no corre hooks = RCE-safe)."

  - nombre: branches
    fuente: src-tauri/src/main.rs:270
    params: []
    retorno: "Vec<Branch>"
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Ramas locales con upstream/ahead/behind."

  - nombre: diff_working
    fuente: src-tauri/src/main.rs:278
    params: []
    retorno: OkfDiff
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: "Diff semántico OKF de HEAD vs working tree (files, generated, stats, statusChanges, suggested)."

  - nombre: commit
    fuente: src-tauri/src/main.rs:286
    params:
      - { nombre: message, tipo: String }
    retorno: "json { sha: String, conformance: CommitConformance }  # {hardFail, warnCount, conform}"
    errores: ["«no hay ningún bundle abierto»", "WorkspaceError como string"]
    semantica: >-
      Commit por el único escritor (libgit2 local) + conformidad post-commit. Tras éxito emite
      el evento `vcs:changed` con el mismo objeto.

eventos:
  - nombre: bundle:changed
    fuente: src-tauri/src/main.rs:69
    payload: BundleSnapshot
    cuando: >-
      El forwarder (hilo por Weak<Store>) recibe IndexEvent del bus de la cache (watcher +
      escrituras) y empuja UN snapshot; coalescing: drena la ráfaga pendiente (un switch/pull
      toca N ficheros) y computa un solo Analysis en vez de N.

  - nombre: vcs:changed
    fuente: src-tauri/src/main.rs:300
    payload: "json { sha: String, conformance: CommitConformance }"
    cuando: "Tras un `commit` exitoso (mismo objeto que devuelve el comando). Contrato: EVENTS.vcsChanged en types.ts."
